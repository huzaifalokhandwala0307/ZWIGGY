{% extends "base.html" %}
{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='predict.css') }}">
{% endblock %}

{% block content %}

    <div class="headinfo">
        <h1>
           ZWIGGY
        </h1>

        <h6>
            Smarter predictions for unpredictable cities.
        </h6>

        <h3>
            App that predicts your delivery time based on your order
        </h3>
    </div>

    <div class="forminput">
        <form onsubmit="return false;" class="delivery-form">

            <label for="city" class="form-label">City:</label>
            <select name="city" id="city" class="dropdown city-dropdown">
                <option value="">-- Select City --</option>
                <option value="bangalore">Bangalore</option>
                <option value="mumbai">Mumbai</option>
                <option value="delhi">Delhi</option>
                <option value="hyderabad">Hyderabad</option>
                <option value="chennai">Chennai</option>
            </select>


            <label for="restaurant" class="form-label">Restaurant:</label>
            <select name="restaurant" id="restaurant" class="dropdown restaurant-dropdown">
                <option value="">-- Select Restaurant --</option>
                <option value="dominos">Dominos</option>
                <option value="kfc">KFC</option>
                <option value="mcdonalds">McDonalds</option>
                <option value="subway">Subway</option>
                <option value="local_cafe">Local Cafe</option>
            </select>


            <label for="distance" class="form-label">Distance (km):</label>
           <input type="number" name="distance" id="distance" step="0.01" class="input distance-input" required>


            <label for="items" class="form-label">Number of Items:</label>
            <input type="number" name="items" id="items" class="input items-input">


            <label for="peak" class="form-label">Peak Hour:</label>
            <select name="peak" id="peak" class="dropdown peak-dropdown">
                <option value="">-- Select Peak Hour --</option>
                <option value="0">No</option>
                <option value="1">Yes</option>
            </select>


            <label for="traffic" class="form-label">Traffic Level:</label>
            <select name="traffic" id="traffic" class="dropdown traffic-dropdown">
                <option value="">-- Select Traffic Level --</option>
                <option value="low">Low</option>
                <option value="medium">Medium</option>
                <option value="high">High</option>
            </select>


            <label for="weather" class="form-label">Weather:</label>
            <select name="weather" id="weather" class="dropdown weather-dropdown">
                <option value="">-- Select Weather --</option>
                <option value="clear">Clear</option>
                <option value="rainy">Rainy</option>
                <option value="foggy">Foggy</option>
            </select>


            <label for="priority" class="form-label">Priority:</label>
            <select name="priority" id="priority" class="dropdown priority-dropdown">
                <option value="">-- Select Priority --</option>
                <option value="normal">Normal</option>
                <option value="fast">Fast</option>
            </select>


            <button type="button" class="submit-btn" onclick="goToPayment()">Place Order</button>

        </form>
    </div>
    </div>

    <!-- Footer -->
    
{% endblock %}
