<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zwiggy</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='base.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    {% block extra_css %}{% endblock %}
</head>
<body>

    <!-- ── Navbar ── -->
    <nav class="navbar">
        <a href="/" class="navbar-brand">Zwiggy</a>
        <ul class="nav-links">
            <li><a href="/home">Home</a></li>
            <li><a href="/predict">Predict Time</a></li>
            <li><a href="/support">Support</a></li>
            <li>
                <span id="userNameDisplay" style="display:none; color:#FC8019; font-weight:bold; margin-right:10px;"></span>
                <a href="#" id="loginBtn" onclick="loginWithGoogle()">Login</a>
                <a href="#" id="logoutBtn" onclick="logout()" style="display:none;">Logout</a>
            </li>
        </ul>
    </nav>

    
{% block content %}{% endblock %}

<!-- ── Footer ── -->
    <footer class="footer">
        <p>© 2025 Zwiggy. All rights reserved.</p>
    </footer>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="{{ url_for('static', filename='js/auth.js') }}"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    <script src="{{ url_for('static', filename='cart.js') }}"></script>
    <script src="{{ url_for('static', filename='js/payment.js') }}"></script>
    <script src="/static/base.js"></script>
</body>
</html>
